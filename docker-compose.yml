services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trinity_user
      POSTGRES_PASSWORD: trinity_password
      POSTGRES_DB: trinity_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql://trinity_user:trinity_password@db:5432/trinity_db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://trinity_user:trinity_password@db:5432/trinity_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
